name: build-native-jar

# Builds the scimage native on each OS/arch on its own GitHub-hosted runner (macOS arm64,
# Linux x86_64, Linux aarch64, Windows x86_64), collects them into the jar-resource layout,
# and builds the SDK jar. No local toolchain needed.
#
# Run it: GitHub -> Actions tab -> "build-native-jar" -> Run workflow.
# Artifacts to download when it finishes: native-<os>-<arch> (each binary) and
# scdataminifier-jar (the assembled jar, minus obfuscation).
#
# This workflow assumes the repository ROOT is the SCDataMinifier folder.
# Dependency sources (libwebp/libavif/aom) are fetched by the build scripts, so they do
# not need to be committed (see .gitignore).

on:
  workflow_dispatch:
  push:
    tags: ['sdk-v*']

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # arm64
            build: bash native/scripts/build-macos.sh && bash native/scripts/install-to-resources.sh
            resdir: macos-aarch64
            lib: libscimage.dylib
          # Both Linux arches build INSIDE a rockylinux:9 container so the .so targets glibc
          # 2.34 (Rocky/RHEL 9 ABI) and loads on Rocky 9+ AND newer distros. The host runner
          # only provides docker + the right CPU (ubuntu-22.04 = x86_64, ubuntu-22.04-arm =
          # aarch64); rockylinux:9 is multi-arch so it pulls the matching variant.
          # nasm lives in Rocky's CRB repo (defined but disabled by default) — enable it with
          # --enablerepo=crb. aom needs nasm ONLY on x86_64; on aarch64 it uses NEON via gcc, so
          # nasm is omitted there (it isn't needed and keeps the dep list minimal).
          - os: ubuntu-22.04    # x86_64 host -> Rocky 9 x86_64 container
            build: docker run --rm -v "$PWD":/work/SCDataMinifier -w /work/SCDataMinifier -e JAVA_HOME=/usr/lib/jvm/java-17-openjdk rockylinux:9 bash -c "dnf install -y --enablerepo=crb gcc gcc-c++ cmake make git tar gzip which diffutils perl-Digest-SHA nasm java-17-openjdk-devel && bash native/scripts/build-linux.sh && bash native/scripts/install-to-resources.sh"
            resdir: linux-x86_64
            lib: libscimage.so
          - os: ubuntu-22.04-arm  # aarch64 host -> Rocky 9 aarch64 container (no nasm; aom uses NEON)
            build: docker run --rm -v "$PWD":/work/SCDataMinifier -w /work/SCDataMinifier -e JAVA_HOME=/usr/lib/jvm/java-17-openjdk rockylinux:9 bash -c "dnf install -y --enablerepo=crb gcc gcc-c++ cmake make git tar gzip which diffutils perl-Digest-SHA java-17-openjdk-devel && bash native/scripts/build-linux.sh && bash native/scripts/install-to-resources.sh"
            resdir: linux-aarch64
            lib: libscimage.so
          - os: windows-2022    # x86_64 (MSVC from the runner + nasm installed below)
            build: powershell -ExecutionPolicy Bypass -File native/scripts/build-windows.ps1
            resdir: windows-x86_64
            lib: scimage.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      # Windows: install nasm in its OWN step and put it on PATH for the build step
      # (choco updates PATH in the registry, not the current process — a same-step install
      # would be invisible to aom's build and cause a cascading "AVIF_LIB not found").
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build native
        shell: bash
        run: ${{ matrix.build }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.resdir }}
          path: resources/native/${{ matrix.resdir }}/${{ matrix.lib }}

  jar:
    needs: native
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: Collect all native binaries
        uses: actions/download-artifact@v4
        with:
          path: staged-natives
          pattern: native-*
      - name: Place natives into resources/native/<os>-<arch>/
        shell: bash
        run: |
          for d in staged-natives/native-*; do
            plat="$(basename "$d" | sed 's/^native-//')"
            mkdir -p "resources/native/$plat"
            cp "$d"/* "resources/native/$plat/"
          done
          find resources/native -type f ! -name README.txt
      - name: Build jar with all natives embedded
        run: bash build-jar.sh
      - uses: actions/upload-artifact@v4
        with:
          name: scdataminifier-jar
          path: dist/scdataminifier.jar

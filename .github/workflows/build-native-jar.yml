name: build-native-jar

# Builds the scimage native on each OS on its own GitHub-hosted runner, collects them into
# the jar-resource layout, and builds the SDK jar. No local toolchain needed.
#
# Run it: GitHub -> Actions tab -> "build-native-jar" -> Run workflow.
# Artifacts to download when it finishes: native-<os>-<arch> (each binary) and
# scdataminifier-jar (the assembled jar, minus obfuscation).
#
# This workflow assumes the repository ROOT is the SCDataMinifier folder.
# Dependency sources (libwebp/libavif/aom) are fetched by the build scripts, so they do
# not need to be committed (see .gitignore).

on:
  workflow_dispatch:
  push:
    tags: ['sdk-v*']

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # arm64
            build: bash native/scripts/build-macos.sh && bash native/scripts/install-to-resources.sh
            resdir: macos-aarch64
            lib: libscimage.dylib
          - os: ubuntu-22.04    # x86_64
            build: sudo apt-get update && sudo apt-get install -y nasm cmake && bash native/scripts/build-linux.sh && bash native/scripts/install-to-resources.sh
            resdir: linux-x86_64
            lib: libscimage.so
          - os: windows-2022    # x86_64 (MSVC + nasm, provided by the runner)
            build: choco install nasm -y; powershell -ExecutionPolicy Bypass -File native/scripts/build-windows.ps1
            resdir: windows-x86_64
            lib: scimage.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: Build native
        shell: bash
        run: ${{ matrix.build }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.resdir }}
          path: resources/native/${{ matrix.resdir }}/${{ matrix.lib }}

  jar:
    needs: native
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: Collect all native binaries
        uses: actions/download-artifact@v4
        with:
          path: staged-natives
          pattern: native-*
      - name: Place natives into resources/native/<os>-<arch>/
        shell: bash
        run: |
          for d in staged-natives/native-*; do
            plat="$(basename "$d" | sed 's/^native-//')"
            mkdir -p "resources/native/$plat"
            cp "$d"/* "resources/native/$plat/"
          done
          find resources/native -type f ! -name README.txt
      - name: Build jar with all natives embedded
        run: bash build-jar.sh
      - uses: actions/upload-artifact@v4
        with:
          name: scdataminifier-jar
          path: dist/scdataminifier.jar

name: build-decoder-mobile

# Builds the decode-only mobile SDK in both format-neutral flavours (A and B), for Android
# (per-ABI .so) and iOS (dynamic xcframework). Each artifact is scrubbed and asserted clean:
# only scdec_*/JNI symbols are exported and no "webp"/"avif"/"aom" token remains.
#
# Run it: Actions -> build-decoder-mobile -> Run workflow (or push a tag sdk-decoder-v*).
# Download: scdec-android-flavourA/B (jniLibs) and scdec-ios-flavourA/B (xcframework).
#
# The embedded license public key comes from native/src/license_pubkey.h — replace it with your
# own (from SCLicenseGenerator) before a production build. Repo ROOT must be the SCDataMinifier
# folder.

on:
  workflow_dispatch:
  push:
    tags: ['sdk-decoder-v*']

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: Install nasm + cmake
        run: sudo apt-get update && sudo apt-get install -y nasm cmake
      - name: Build both flavours for all ABIs (scrub + assert)
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          bash mobile-native/scripts/build-android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: scdec-android-flavourA
          path: mobile-native/out/android/flavourA/*/libscdec.so
      - uses: actions/upload-artifact@v4
        with:
          name: scdec-android-flavourB
          path: mobile-native/out/android/flavourB/*/libscdec.so

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install nasm
        run: brew install nasm
      - name: Build both flavours (dynamic xcframework, scrub + assert)
        shell: bash
        run: bash mobile-native/scripts/build-ios.sh
      - uses: actions/upload-artifact@v4
        with:
          name: scdec-ios-flavourA
          path: mobile-native/out/ios/flavourA/scdec.xcframework
      - uses: actions/upload-artifact@v4
        with:
          name: scdec-ios-flavourB
          path: mobile-native/out/ios/flavourB/scdec.xcframework

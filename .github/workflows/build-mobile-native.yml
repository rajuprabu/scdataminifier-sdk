name: build-mobile-native

# Builds the license-gated native scimage library for Android (per-ABI .so) and iOS
# (static xcframework) on CI. These are the binaries the Flutter apps embed:
#   - Android: app/src/main/jniLibs/<abi>/libscimage.so  (or via an FFI plugin)
#   - iOS:     scimage.xcframework, statically linked (Apple forbids in-memory dlopen)
#
# The native now compiles license.c + sha256.c + micro-ecc and embeds the public key from
# native/src/license_pubkey.h — replace that header with your own (from SCLicenseGenerator)
# before a production build. This workflow assumes the repo ROOT is the SCDataMinifier folder.

on:
  workflow_dispatch:
  push:
    tags: ['sdk-mobile-v*']

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: Install nasm (aom x86_64 asm) + cmake
        run: sudo apt-get update && sudo apt-get install -y nasm cmake
      - name: Build native for all ABIs
        shell: bash
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          echo "Using NDK at $ANDROID_NDK_HOME"
          bash native/scripts/build-android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: scimage-android
          path: |
            native/out/android/arm64-v8a/libscimage.so
            native/out/android/armeabi-v7a/libscimage.so
            native/out/android/x86_64/libscimage.so

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install nasm (aom x86_64 sim slice)
        run: brew install nasm
      - name: Build static xcframework
        shell: bash
        run: bash native/scripts/build-ios.sh
      - uses: actions/upload-artifact@v4
        with:
          name: scimage-ios-xcframework
          path: native/out/ios/scimage.xcframework
